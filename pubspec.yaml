name: cosmosafe
description: "CosmoSafe — Scan cosmetic ingredients, get safety ratings A-E based on Indian compliance (IS 4707)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  image_picker: ^1.1.2

  # On-device OCR (Android & iOS)
  google_mlkit_text_recognition: ^0.14.0

  # State management
  provider: ^6.1.2

  # Persist user profile locally
  shared_preferences: ^2.3.4

  # Smooth micro-animations
  flutter_animate: ^4.5.2

  # Circular percent indicator for rating badge
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
